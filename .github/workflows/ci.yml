name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # Start PostgreSQL for tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dataintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Start Qdrant for tests
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      # Step 1: Clone repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'     # cache pip packages between runs

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      # Step 4: Set environment variables
      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres @localhost:5432/dataintel" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "QDRANT_PORT=6333" >> $GITHUB_ENV
          echo "COLLECTION_NAME=data_intel" >> $GITHUB_ENV
          echo "EMBEDDING_MODEL=all-MiniLM-L6-v2" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=sqlite:///mlflow.db" >> $GITHUB_ENV

      # Step 5: Start FastAPI in background
      - name: Start FastAPI server
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 10   # wait for server to start

      # Step 6: Run tests
      - name: Run API tests
        run: |
          pytest tests/ -v --tb=short

      # Step 7: Show test summary
      - name: Test Summary
        if: always()
        run: |
          echo "✅ CI Pipeline completed!"