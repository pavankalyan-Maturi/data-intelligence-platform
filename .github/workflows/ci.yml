name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dataintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest requests

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dataintel" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "QDRANT_PORT=6333" >> $GITHUB_ENV
          echo "COLLECTION_NAME=data_intel" >> $GITHUB_ENV
          echo "EMBEDDING_MODEL=all-MiniLM-L6-v2" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=sqlite:///mlflow.db" >> $GITHUB_ENV

      # 🆕 Test imports before starting server
      - name: Test Python imports
        run: |
          python -c "from backend.main import app; print('✅ Imports OK')"

      - name: Start FastAPI server
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 --log-level debug > fastapi.log 2>&1 &
          echo "FastAPI PID: $!"
          echo "Waiting for FastAPI..."
          for i in {1..20}; do
            if curl -s http://localhost:8000/ > /dev/null 2>&1; then
              echo "✅ FastAPI ready after ${i} attempts!"
              break
            fi
            echo "Attempt $i/20 - waiting 5s..."
            sleep 5
          done

      # 🆕 Show FastAPI logs if it failed
      - name: Show FastAPI logs
        if: always()
        run: |
          echo "=== FastAPI Logs ==="
          cat fastapi.log || echo "No log file found"

      - name: Verify FastAPI is running
        run: |
          curl -f http://localhost:8000/ || (cat fastapi.log && exit 1)

      - name: Run API tests
        run: |
          pytest tests/ -v --tb=short

      - name: Test Summary
        if: always()
        run: echo "✅ CI Pipeline completed!"