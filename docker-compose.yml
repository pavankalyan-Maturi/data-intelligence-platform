services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: dataintel_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dataintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataintel_network

  # ── Qdrant Vector Database ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: dataintel_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - dataintel_network

  # ── MLflow Tracking Server ───────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: dataintel_mlflow
    command: >
      bash -c "pip install mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow_data/mlflow.db
               --default-artifact-root /mlflow_data/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow_data
    networks:
      - dataintel_network

  # ── FastAPI Backend ──────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataintel_fastapi
    environment:
      - DATABASE_URL=postgresql://postgres:postgres @postgres:5432/dataintel
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=data_intel
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OLLAMA_HOST=host.docker.internal
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      mlflow:
        condition: service_started
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dataintel_network
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: dataintel_streamlit
    environment:
      - API_BASE=http://fastapi:8000/api
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    volumes:
      - ./:/app
    networks:
      - dataintel_network
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_storage:
  mlflow_data:

# ── Networks ──────────────────────────────────────────────────
networks:
  dataintel_network:
    driver: bridge
