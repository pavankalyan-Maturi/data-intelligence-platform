services:
  # ── FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: dataintel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dataintel-db
          property: connectionString
      - key: QDRANT_HOST
        value: dataintel-qdrant
      - key: QDRANT_PORT
        value: 6333
      - key: COLLECTION_NAME
        value: data_intel
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: MLFLOW_TRACKING_URI
        value: sqlite:///mlflow.db
      - key: GROQ_API_KEY
        sync: false
      - key: OLLAMA_HOST
        value: ""

  # ── Streamlit Frontend ───────────────────────────────────────
  - type: web
    name: dataintel-ui
    runtime: docker
    dockerfilePath: ./Dockerfile.streamlit
    dockerContext: .
    envVars:
      - key: API_BASE
        fromService:
          name: dataintel-api
          type: web
          property: host
          envVarKey: API_URL

databases:
  # ── PostgreSQL ───────────────────────────────────────────────
  - name: dataintel-db
    databaseName: dataintel
    user: postgres
    plan: free